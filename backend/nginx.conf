events {
    worker_connections 1024;
}

http {
    upstream auth-service {
        server auth-service:3001;
    }
    upstream user-service {
        server user-service:3002;
    }


    # Upstream blocks for remaining services added as they are built

    upstream session-service {
        server session-service:3003;
    }
    upstream dungeon-service {
        server dungeon-service:3004;
    }
    upstream inventory-service {
        server inventory-service:3005;
    }

    server {
        listen 80;

        # Public endpoints — no token required
        location /auth/register {
            proxy_pass http://auth-service/auth/register;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /auth/login {
            proxy_pass http://auth-service/auth/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Internal subrequest target — not reachable by external clients
        location = /auth/validate {
            internal;
            proxy_pass http://auth-service/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }
        # Protected routes — every request validated before reaching upstream
        location /api/ {
            auth_request /auth/validate;
            auth_request_set $user_id $upstream_http_x_user_id;

            proxy_set_header X-User-ID $user_id;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            location /api/users/ {
                proxy_pass http://user-service/users/;
            }

            location /api/sessions/ {
                proxy_pass http://session-service/sessions/;
            }
            location /api/dungeon/ {
                proxy_pass http://dungeon-service/dungeon/;
            }
            location /api/inventory/ {
                proxy_pass http://inventory-service/inventory/;
            }
        }
    }
}